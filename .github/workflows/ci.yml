name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/web/backend/requirements.txt

      - name: Run pytest
        run: pytest -q tests

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          cache: npm
          cache-dependency-path: src/web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix src/web/frontend

      - name: Run frontend lint
        run: npm run lint --prefix src/web/frontend
